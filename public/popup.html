<!DOCTYPE html>
<html>

<head>
  <title>Login with Code</title>
  <style>
    body {
      width: 280px;
      padding: 15px;
      font-family: Arial;
    }

    input {
      width: 100%;
      margin-bottom: 10px;
      padding: 8px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 8px;
      margin-bottom: 10px;
      border: none;
      cursor: pointer;
      background: #4285f4;
      color: white;
    }

    button:disabled {
      background: #999;
      cursor: not-allowed;
    }
  </style>
</head>

<body>

  <h3>Login</h3>

  <input type="email" id="email" placeholder="Enter your email" />

  <button id="sendCodeBtn">Send Code</button>

  <input type="text" id="code" placeholder="Enter verification code" />

  <button id="verifyBtn">Verify</button>

  <script src="popup.js"></script>
</body>

</html>
