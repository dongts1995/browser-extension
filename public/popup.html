<!DOCTYPE html>
<html>

<head>
  <title>Login</title>
  <style>
    body {
      width: 280px;
      padding: 15px;
      font-family: Arial;
    }

    input {
      width: 100%;
      margin-bottom: 10px;
      padding: 8px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 8px;
      margin-bottom: 10px;
      border: none;
      cursor: pointer;
      background: #4285f4;
      color: white;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

  <!-- LOGIN VIEW -->
  <div id="loginView1">
    <h3>Welcome to Portals</h3>
    <button id="connectGoogleBtn">Connect Google</button>
    <button id="connectMicrosoftBtn">I'm using Microsoft</button>

    <input type="email" id="email" placeholder="Enter your email" />
    <button id="sendCodeBtn">Send Code</button>
  </div>

  <!-- LOGIN VIEW 2 -->
  <div id="loginView2">
    <h3>Enter verification code</h3>
    <p id="sentCodeEmailText">We sent a verification code to </p>
    <input type="text" id="code" placeholder="Enter verification code" />
    <button id="verifyCodeBtn">Verify</button>
    <button id="resendCodeBtn">Resend Code</button>
  </div>

  <!-- LOGGED IN VIEW -->
  <div id="loggedInView" class="hidden">
    <h3>Logged In</h3>
    <p id="userEmailText"></p>

    <h3>Select Event</h3>
    <select id="eventSelect">
      <option value="">Loading events...</option>
    </select>
    <input id="eventId" type="text" placeholder="Event ID" readonly />

    <button id="logoutBtn">Logout</button>
  </div>

  <script type="module" src="popup.js"></script>
</body>

</html>
