<!DOCTYPE html>
<html>

<head>
  <title>Login</title>
  <style>
    body {
      width: 250px;
      padding: 15px;
      font-family: Arial;
    }

    input {
      width: 100%;
      margin-bottom: 10px;
      padding: 8px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 8px;
      background: #4285f4;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h3>Login</h3>

  <input type="text" id="email" placeholder="Email" />
  <input type="password" id="password" placeholder="Password" />

  <button id="loginBtn">Login</button>

  <script src="popup.js"></script>

</body>

</html>
